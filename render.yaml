services:
  - type: web
    name: pizza-analyst-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python seed_db.py
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # you set this manually in Render dashboard
      - key: DATABASE_URL
        value: sqlite:///./pizza_sales.db
